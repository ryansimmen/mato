# GoReleaser configuration for mato.
# Schema documentation: https://goreleaser.com/customization/
#
# Build matrix is intentionally Linux-only because mato orchestrates Docker
# containers running Copilot agents; the deployment target is Linux servers
# and Linux developer workstations. macOS and Windows are out of scope.

version: 2

project_name: mato

before:
  hooks:
    # Fail fast if go.mod/go.sum drift from what `go mod tidy` would produce,
    # without mutating any tracked files. The release should be a deterministic
    # snapshot of the tagged tree; running `go mod tidy` here would mask drift
    # by silently fixing it. (`go mod verify` only checks that the module cache
    # matches go.sum hashes; it does not detect tidiness drift, so it is not
    # the right tool for this hook.) `make verify` runs the same `tidy -diff`
    # check during normal development and CI.
    - go mod tidy -diff

builds:
  - id: mato
    main: ./cmd/mato
    binary: mato
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    mod_timestamp: "{{ .CommitTimestamp }}"
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}

archives:
  - id: mato
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    builds_info:
      mtime: "{{ .CommitDate }}"
    files:
      - src: LICENSE
        info:
          mtime: "{{ .CommitDate }}"
      - src: README.md
        info:
          mtime: "{{ .CommitDate }}"
      - src: CHANGELOG.md
        info:
          mtime: "{{ .CommitDate }}"

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

# Cosign keyless signing via Sigstore + GitHub OIDC.
#
# cosign v3+ uses a single .sigstore.json bundle file per artifact (the
# new bundle format) instead of separate .sig + .pem files. Each archive
# and the checksums.txt are signed; verifying checksums.txt transitively
# attests to every artifact in the release.
#
# Verification (consumer side):
#   cosign verify-blob \
#     --certificate-identity-regexp 'https://github.com/ryansimmen/mato/.*' \
#     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
#     --bundle <artifact>.sigstore.json \
#     <artifact>
signs:
  - id: cosign-archives
    cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - "--yes"
      - "--bundle=${signature}"
      - "${artifact}"
    artifacts: archive
    output: true
  - id: cosign-checksums
    cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - "--yes"
      - "--bundle=${signature}"
      - "${artifact}"
    artifacts: checksum
    output: true
  - id: cosign-sboms
    cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - "--yes"
      - "--bundle=${signature}"
      - "${artifact}"
    artifacts: sbom
    output: true

# SBOM generation via Syft. One SPDX JSON SBOM per archive, named to
# match the archive (e.g. mato_0.1.3_linux_amd64.tar.gz.sbom.json),
# uploaded as release assets. Provides a verifiable inventory of every
# Go module and license shipped in each binary, satisfying emerging
# supply-chain requirements (Scorecard SBOM check, EU CRA, SSDF).
#
# Verification (consumer side):
#   syft scan file:./mato_<version>_linux_amd64.tar.gz -o spdx-json \
#     | diff - mato_<version>_linux_amd64.tar.gz.sbom.json
sboms:
  - id: archive-sboms
    artifacts: archive
    documents:
      - "${artifact}.sbom.json"

# Release notes are supplied via --release-notes from the workflow,
# extracted from CHANGELOG.md by tag. Disable GoReleaser's own changelog
# generation so it does not append commit summaries on top.
changelog:
  disable: true

release:
  github:
    owner: ryansimmen
    name: mato
  prerelease: auto
  # NOTE: do not set `mode:` here. The release body is set explicitly by
  # the workflow via `gh release edit` after GoReleaser publishes, so
  # GoReleaser's own release-notes handling is bypassed entirely.
  # `mode: replace` was tried as a fix for empty release bodies but had
  # no effect; the workaround in the workflow is what actually populates
  # the body.
  #
  # Replace assets that already exist with the same name. Without this, a
  # rerun after a partial failure (e.g. transient signing error after some
  # archives have already uploaded) hits GitHub's 422 already_exists and
  # requires manual asset cleanup before the workflow can finish.
  replace_existing_artifacts: true
  name_template: "{{ .Tag }}"
