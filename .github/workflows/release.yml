name: release

# Triggered by pushing a v* tag. Builds linux/amd64 + linux/arm64 binaries
# with GoReleaser, signs each archive and the checksums.txt with cosign
# keyless (Sigstore + GitHub OIDC), generates SLSA build provenance
# attestations for each archive, and publishes a GitHub Release using
# the matching CHANGELOG.md section as release notes.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write       # publish the GitHub Release and upload artifacts.
      id-token: write       # OIDC token for cosign keyless signing and
                            # SLSA provenance attestations.
      attestations: write   # actions/attest-build-provenance writes to the
                            # repository's attestation store.
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0   # GoReleaser needs full history to compute version.

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Install syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          # Write outside the worktree so GoReleaser's git-clean check
          # does not flag release-notes.md as a dirty/untracked file.
          notes="${RUNNER_TEMP}/release-notes.md"
          # Match "## [X.Y.Z..." line, capture everything until the next
          # "## [" heading, a link-reference footer, or end-of-file.
          if ! awk -v v="$version" '
            $0 ~ "^## \\[" v "(\\]| )" { p = 1; next }
            p && (/^## \[/ || /^\[Unreleased\]:/ || /^\[[0-9]+\.[0-9]+\.[0-9]+\]:/) { exit }
            p { print }
          ' CHANGELOG.md > "$notes"; then
            echo "Failed to extract release notes for $version" >&2
            exit 1
          fi
          if [ ! -s "$notes" ]; then
            echo "No CHANGELOG section found for version $version" >&2
            exit 1
          fi
          # Trim leading/trailing blank lines without depending on sed-in-place.
          awk 'NF { p = 1 } p { print }' "$notes" \
            | tac | awk 'NF { p = 1 } p { print }' | tac > "${notes}.trimmed"
          mv "${notes}.trimmed" "$notes"
          echo "notes-path=${notes}" >> "$GITHUB_OUTPUT"
          echo "Release notes for $version:"
          cat "$notes"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@e24998b8b67b290c2fa8b7c14fcfa7de2c5c9b8c # v7.1.0
        with:
          distribution: goreleaser
          # Floats to the latest GoReleaser v2 release at workflow-run time.
          # Accepted tradeoff: historical tag rebuilds may not be byte-
          # identical to the original release, but the binaries are signed
          # at the time of the original release run and rebuilds are not
          # expected. Dependabot does not update this `version:` input, so
          # pinning would require manual upkeep that is more likely to go
          # stale than the floating constraint is to break.
          version: "~> v2"
          args: release --clean --release-notes=${{ steps.notes.outputs.notes-path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SLSA build provenance
        id: provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          # Attest each archive and SBOM emitted by GoReleaser. The bundle
          # path output points to a single .jsonl file containing one DSSE-
          # wrapped in-toto SLSA v1 provenance statement per subject.
          subject-path: |
            dist/mato_*_linux_amd64.tar.gz
            dist/mato_*_linux_arm64.tar.gz
            dist/mato_*_linux_amd64.tar.gz.sbom.json
            dist/mato_*_linux_arm64.tar.gz.sbom.json

      - name: Attach provenance to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUNDLE_PATH: ${{ steps.provenance.outputs.bundle-path }}
        run: |
          set -euo pipefail
          # Scorecard's Signed-Releases check looks for *.intoto.jsonl
          # release assets to award full credit for SLSA provenance.
          # The attest action's bundle is already in JSONL DSSE format;
          # rename to the conventional extension and upload alongside
          # the archives.
          asset="${RUNNER_TEMP}/mato_${GITHUB_REF_NAME#v}.intoto.jsonl"
          cp "$BUNDLE_PATH" "$asset"
          gh release upload "$GITHUB_REF_NAME" "$asset" --clobber
