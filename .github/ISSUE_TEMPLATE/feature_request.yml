name: Feature request
description: Suggest an improvement to mato
title: "feature: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you want.
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: Use case / who benefits
      description: Describe a concrete scenario and which users or workflows benefit.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe any workarounds or alternative designs you considered.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add examples, screenshots, queue state, or links if helpful.
