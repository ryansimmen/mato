name: Bug report
description: Report incorrect behavior, regressions, or runtime failures
title: "bug: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: List the commands, inputs, or repository state needed to reproduce the issue.
      placeholder: |
        1. Run `mato ...`
        2. ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, Go version, Docker version, `gh` version, `copilot` version, and any relevant config.
      placeholder: |
        OS:
        Go:
        Docker:
        gh:
        copilot:
        mato:
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or output
      description: Paste the relevant output, stack trace, or `mato doctor` results.
